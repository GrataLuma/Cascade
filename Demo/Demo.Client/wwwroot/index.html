<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grata Cascade — paper companion demo</title>
    <meta name="description" content="One-shot key agreement primitive on hash preimage resistance — paper companion demo." />
    <base href="/" />

    <!-- Bootstrap 5 baseline (utility classes, grid, components). -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Akademický paper-companion override Bootstrap defaultů. Pořadí
         důležité — site.css po Bootstrap, aby přebíjelo. -->
    <link href="css/site.css" rel="stylesheet" />

    <!-- Component-scoped Blazor CSS bundle (Index.razor.css apod.). -->
    <link href="Demo.Client.styles.css" rel="stylesheet" />

    <!-- Inline SVG favicon — žádný extra request, paper-style monogram. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231f4e79'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='20' font-weight='700' text-anchor='middle' fill='%23fbfaf7'%3EG%3C/text%3E%3C/svg%3E" />
</head>
<body>
    <div id="app">
        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
            <div class="spinner-border" role="status" style="color: #1f4e79;">
                <span class="visually-hidden">Loading…</span>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-0 p-3 d-none">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        // Lightweight localStorage helper pro LanguageService.
        window.langStore = {
            get: () => { try { return localStorage.getItem('gc-lang') || ''; } catch { return ''; } },
            set: (v) => { try { localStorage.setItem('gc-lang', v); } catch { /* ignore */ } }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
